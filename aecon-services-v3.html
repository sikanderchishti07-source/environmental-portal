<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AECON Services</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--ink:#0d2b29;--teal-deep:#0f3d3e;--teal-mid:#1a5f5f;--teal-bright:#2d8a8a;--teal-pale:#e4f1f0;--gold:#c8914e;--muted:#607a75;--page-bg:#f2f5f4;--white:#ffffff;--ease:cubic-bezier(.22,1,.36,1);--spring:cubic-bezier(.34,1.4,.64,1)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--page-bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
    .svc-section{min-height:100vh;display:flex;align-items:center;padding:100px 0 80px;overflow:hidden;position:relative}
    .svc-section::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(15,61,62,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(15,61,62,.03) 1px,transparent 1px);background-size:44px 44px;pointer-events:none}
    .svc-inner{display:grid;grid-template-columns:340px 1fr;width:100%;align-items:center}
    .svc-left{padding:0 40px 0 clamp(24px,5vw,80px);position:relative;z-index:2}
    .svc-eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:.68rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--teal-bright);margin-bottom:18px}
    .svc-eyebrow-dot{width:6px;height:6px;border-radius:50%;background:var(--teal-bright);animation:epulse 2.2s ease-in-out infinite}
    @keyframes epulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.6)}}
    .svc-heading{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,3.5vw,3.4rem);font-weight:900;line-height:1.08;letter-spacing:-.03em;color:var(--ink);margin-bottom:18px}
    .svc-heading em{font-style:italic;color:var(--teal-bright)}
    .svc-desc{font-size:.95rem;line-height:1.75;color:var(--muted);margin-bottom:36px;max-width:260px}
    .svc-counter{display:flex;align-items:baseline;gap:6px;margin-bottom:30px}
    .svc-counter-cur{font-family:'Plus Jakarta Sans',sans-serif;font-size:2.6rem;font-weight:800;color:var(--teal-deep);line-height:1;min-width:52px;transition:all .35s var(--ease)}
    .svc-counter-sep{font-size:1rem;color:var(--muted);opacity:.45;font-weight:300}
    .svc-counter-total{font-size:1rem;color:var(--muted);font-weight:500}
    .svc-nav{display:flex;gap:10px;margin-bottom:28px}
    .svc-nav-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(15,61,62,.2);background:transparent;color:var(--teal-mid);font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .22s var(--ease)}
    .svc-nav-btn:hover{background:var(--teal-deep);border-color:var(--teal-deep);color:#fff;transform:scale(1.08)}
    .svc-dots{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .svc-dot{width:7px;height:7px;border-radius:999px;background:rgba(15,61,62,.18);cursor:pointer;border:none;transition:all .35s var(--spring)}
    .svc-dot.active{width:24px;background:var(--teal-mid)}
    .svc-hint{margin-top:20px;font-size:.7rem;color:var(--muted);opacity:.7;display:flex;align-items:center;gap:6px}
    .svc-track-wrap{overflow:hidden;padding:24px 0;mask-image:linear-gradient(to right,transparent 0%,black 5%,black 88%,transparent 100%);-webkit-mask-image:linear-gradient(to right,transparent 0%,black 5%,black 88%,transparent 100%)}
    .svc-track{display:flex;gap:16px;transition:transform .62s var(--ease);will-change:transform;padding:0 24px;cursor:grab;user-select:none}
    .svc-track.dragging{cursor:grabbing;transition:none}
    .svc-card{position:relative;width:265px;height:410px;border-radius:20px;overflow:hidden;flex-shrink:0;cursor:pointer;transition:width .55s var(--ease),box-shadow .35s var(--ease),transform .35s var(--ease);box-shadow:0 8px 28px rgba(10,40,37,.12)}
    .svc-card.active{width:400px;box-shadow:0 24px 70px rgba(10,40,37,.22);transform:translateY(-5px)}
    .svc-card:hover:not(.active){transform:translateY(-3px);box-shadow:0 14px 44px rgba(10,40,37,.18)}
    .svc-card-img{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .8s var(--ease)}
    .svc-card:hover .svc-card-img,.svc-card.active .svc-card-img{transform:scale(1.07)}
    .svc-card-overlay{position:absolute;inset:0}
    .svc-card-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(5,20,20,.05) 0%,transparent 35%,rgba(5,20,20,.55) 62%,rgba(5,20,20,.93) 100%)}
    .svc-card-bg-num{position:absolute;top:10px;right:14px;font-family:'Playfair Display',serif;font-size:6.5rem;font-weight:900;color:rgba(255,255,255,.05);line-height:1;letter-spacing:-.05em;pointer-events:none;user-select:none}
    .svc-card-content{position:absolute;bottom:0;left:0;right:0;padding:24px 22px 22px}
    .svc-card-num{font-size:.6rem;font-weight:700;letter-spacing:.14em;color:rgba(255,255,255,.48);margin-bottom:5px;text-transform:uppercase}
    .svc-card-name{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:#fff;line-height:1.22;letter-spacing:-.02em;margin-bottom:0;transition:margin-bottom .4s var(--ease)}
    .svc-card.active .svc-card-name{margin-bottom:10px}
    .svc-card-sub{font-size:.73rem;color:rgba(255,255,255,.62);font-weight:500;line-height:1.4;max-height:0;overflow:hidden;opacity:0;transition:max-height .42s var(--ease),opacity .32s var(--ease)}
    .svc-card.active .svc-card-sub{max-height:50px;opacity:1}
    .svc-card-body{max-height:0;overflow:hidden;opacity:0;transition:max-height .5s var(--ease),opacity .4s .06s var(--ease)}
    .svc-card.active .svc-card-body{max-height:260px;opacity:1}
    .svc-card-desc{font-size:.75rem;color:rgba(255,255,255,.68);line-height:1.65;margin-top:10px;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .svc-card-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
    .svc-card-pill{padding:4px 10px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);font-size:.6rem;font-weight:600;color:rgba(255,255,255,.85);backdrop-filter:blur(6px);white-space:nowrap}
    .svc-card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:12px}
    .svc-card-stat{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);border-radius:9px;padding:7px 5px;text-align:center}
    .svc-card-stat-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;font-weight:800;color:#fff;display:block;line-height:1;margin-bottom:2px}
    .svc-card-stat-lbl{font-size:.52rem;color:rgba(255,255,255,.48);letter-spacing:.06em;text-transform:uppercase}
    .svc-card-more{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:999px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:.74rem;font-weight:700;cursor:pointer;backdrop-filter:blur(10px);transition:background .2s,transform .2s}
    .svc-card-more:hover{background:rgba(255,255,255,.25);transform:translateX(2px)}
    .ov-0{background:linear-gradient(140deg,rgba(15,61,62,.72),rgba(45,138,138,.52))}
    .ov-1{background:linear-gradient(140deg,rgba(55,32,8,.76),rgba(180,90,30,.5))}
    .ov-2{background:linear-gradient(140deg,rgba(25,38,78,.74),rgba(65,98,178,.48))}
    .ov-3{background:linear-gradient(140deg,rgba(8,52,26,.76),rgba(38,128,76,.5))}
    .ov-4{background:linear-gradient(140deg,rgba(12,38,68,.76),rgba(28,96,158,.52))}
    .ov-5{background:linear-gradient(140deg,rgba(28,52,12,.76),rgba(78,138,46,.48))}
    .ov-6{background:linear-gradient(140deg,rgba(8,38,58,.76),rgba(18,88,140,.52))}
    .ov-7{background:linear-gradient(140deg,rgba(48,24,58,.76),rgba(128,58,158,.48))}
    .ov-8{background:linear-gradient(140deg,rgba(28,48,18,.76),rgba(68,118,48,.5))}
    .ov-9{background:linear-gradient(140deg,rgba(48,38,8,.76),rgba(158,118,28,.5))}
    .detail-backdrop{position:fixed;inset:0;background:rgba(5,20,20,.65);backdrop-filter:blur(6px);z-index:9000;opacity:0;pointer-events:none;transition:opacity .4s var(--ease)}
    .detail-backdrop.open{opacity:1;pointer-events:all}
    .detail-panel{position:fixed;top:0;right:0;bottom:0;width:min(520px,100vw);background:var(--white);z-index:9001;transform:translateX(100%);transition:transform .52s var(--ease);display:flex;flex-direction:column;overflow:hidden;box-shadow:-20px 0 80px rgba(5,20,20,.25)}
    .detail-panel.open{transform:translateX(0)}
    .dp-img{position:relative;height:260px;flex-shrink:0;overflow:hidden}
    .dp-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .8s var(--ease)}
    .detail-panel.open .dp-img img{transform:scale(1.04)}
    .dp-img-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(5,20,20,.06) 0%,transparent 40%,rgba(5,20,20,.75) 100%)}
    .dp-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:background .2s,transform .2s;z-index:10}
    .dp-close:hover{background:rgba(255,255,255,.3);transform:scale(1.1) rotate(90deg)}
    .dp-badge{position:absolute;top:16px;left:18px;display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:999px;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.22);background:rgba(15,61,62,.5)}
    .dp-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
    .dp-watermark{position:absolute;bottom:-14px;right:16px;font-family:'Playfair Display',serif;font-size:8rem;font-weight:900;color:rgba(255,255,255,.05);line-height:1;letter-spacing:-.05em;user-select:none;pointer-events:none}
    .dp-title-block{position:absolute;bottom:18px;left:22px;right:22px;display:flex;align-items:flex-end;gap:13px}
    .dp-icon{width:48px;height:48px;border-radius:13px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#fff;flex-shrink:0}
    .dp-title{font-family:'Playfair Display',serif;font-size:clamp(1.1rem,2vw,1.45rem);font-weight:700;color:#fff;line-height:1.2;letter-spacing:-.02em;margin-bottom:4px}
    .dp-subtitle{font-size:.72rem;color:rgba(255,255,255,.62);font-weight:500}
    .dp-body{flex:1;overflow-y:auto;padding:28px 28px 32px;display:flex;flex-direction:column;gap:22px}
    .dp-body::-webkit-scrollbar{width:4px}
    .dp-body::-webkit-scrollbar-thumb{background:rgba(15,61,62,.15);border-radius:4px}
    .detail-panel.open .dp-desc{animation:dp-in .5s .08s var(--ease) both}
    .detail-panel.open .dp-feats{animation:dp-in .5s .16s var(--ease) both}
    .detail-panel.open .dp-stats-grid{animation:dp-in .5s .22s var(--ease) both}
    .detail-panel.open .dp-cta-row{animation:dp-in .5s .30s var(--ease) both}
    @keyframes dp-in{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .dp-desc{font-size:.9rem;line-height:1.8;color:#4a6860}
    .dp-section-label{font-size:.62rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--teal-bright);margin-bottom:10px}
    .dp-feats{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .dp-feat{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;background:var(--teal-pale);border-radius:11px;border:1px solid rgba(45,138,138,.1);transition:background .2s,transform .2s var(--ease)}
    .dp-feat:hover{background:rgba(45,138,138,.1);transform:translateY(-1px)}
    .dp-feat-icon{width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,var(--teal-mid),var(--teal-bright));display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
    .dp-feat-icon i{color:#fff;font-size:.42rem}
    .dp-feat-text{font-size:.74rem;color:#2a4a42;line-height:1.5;font-weight:500}
    .dp-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .dp-stat{background:linear-gradient(135deg,var(--teal-deep),var(--teal-mid));border-radius:13px;padding:14px 10px;text-align:center;transition:transform .22s var(--ease),box-shadow .22s}
    .dp-stat:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(15,61,62,.28)}
    .dp-stat-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.15rem;font-weight:800;color:#f0d9bc;display:block;line-height:1;margin-bottom:3px}
    .dp-stat-lbl{font-size:.58rem;color:rgba(255,255,255,.42);letter-spacing:.07em;text-transform:uppercase}
    .dp-cta-row{display:flex;gap:10px;flex-wrap:wrap}
    .dp-btn-p{display:inline-flex;align-items:center;gap:7px;padding:12px 24px;background:linear-gradient(135deg,var(--teal-deep),var(--teal-mid));color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:700;border-radius:999px;border:none;cursor:pointer;text-decoration:none;box-shadow:0 4px 16px rgba(15,61,62,.28);transition:all .25s var(--ease)}
    .dp-btn-p:hover{background:linear-gradient(135deg,var(--teal-mid),var(--teal-bright));box-shadow:0 8px 24px rgba(15,61,62,.36);transform:translateY(-2px)}
    .dp-btn-g{display:inline-flex;align-items:center;gap:7px;padding:12px 24px;background:transparent;color:var(--teal-mid);font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:700;border-radius:999px;border:2px solid rgba(15,61,62,.18);cursor:pointer;text-decoration:none;transition:all .22s}
    .dp-btn-g:hover{background:rgba(15,61,62,.05);border-color:var(--teal-mid)}
    .dp-divider{height:1px;background:rgba(15,61,62,.08)}
    .reveal{opacity:0;transform:translateY(28px);transition:opacity .8s var(--ease),transform .8s var(--ease)}
    .reveal.visible{opacity:1;transform:translateY(0)}
    .reveal-d1{transition-delay:.1s}
    .reveal-d2{transition-delay:.2s}
    .reveal-d3{transition-delay:.3s}
    @media(max-width:960px){.svc-inner{grid-template-columns:1fr}.svc-left{padding:clamp(20px,5vw,40px);padding-bottom:8px;text-align:center}.svc-desc{max-width:100%;margin:0 auto 28px}.svc-nav,.svc-dots,.svc-counter,.svc-hint{justify-content:center}.svc-card{width:248px;height:375px}.svc-card.active{width:330px}}
    @media(max-width:540px){.svc-section{padding:70px 0 60px}.svc-card{width:210px;height:330px}.svc-card.active{width:270px}.svc-card-stats{display:none}.detail-panel{width:100vw;border-radius:20px 20px 0 0;top:auto;height:94vh;transform:translateY(100%)}.detail-panel.open{transform:translateY(0)}.dp-feats{grid-template-columns:1fr}}
  </style>
</head>
<body>

<section id="services" class="svc-section">
  <div class="svc-inner">
    <div class="svc-left">
      <div class="svc-eyebrow reveal"><span class="svc-eyebrow-dot"></span>Our Expertise</div>
      <h2 class="svc-heading reveal reveal-d1">Solutions for <em>every</em><br>environmental<br>challenge</h2>
      <p class="svc-desc reveal reveal-d2">Full-spectrum environmental monitoring and consultancy across the Kingdom of Saudi Arabia.</p>
      <div class="svc-counter reveal reveal-d2">
        <span class="svc-counter-cur" id="svcCur">01</span>
        <span class="svc-counter-sep">/</span>
        <span class="svc-counter-total">10</span>
      </div>
      <div class="svc-nav reveal reveal-d3">
        <button class="svc-nav-btn" id="svcPrev"><i class="fas fa-arrow-left"></i></button>
        <button class="svc-nav-btn" id="svcNext"><i class="fas fa-arrow-right"></i></button>
      </div>
      <div class="svc-dots reveal reveal-d3" id="svcDots"></div>
      <p class="svc-hint reveal reveal-d3"><i class="fas fa-hand-pointer"></i> Click any card for full details</p>
    </div>
    <div class="svc-track-wrap reveal reveal-d2">
      <div class="svc-track" id="svcTrack"></div>
    </div>
  </div>
</section>

<div class="detail-backdrop" id="detailBackdrop"></div>
<aside class="detail-panel" id="detailPanel">
  <div class="dp-img">
    <img id="dpImg" src="" alt=""/>
    <div class="dp-img-overlay"></div>
    <button class="dp-close" id="dpClose"><i class="fas fa-times"></i></button>
    <div class="dp-badge" id="dpBadge"></div>
    <div class="dp-watermark" id="dpWm"></div>
    <div class="dp-title-block">
      <div class="dp-icon" id="dpIcon"></div>
      <div><div class="dp-title" id="dpTitle"></div><div class="dp-subtitle" id="dpSub"></div></div>
    </div>
  </div>
  <div class="dp-body">
    <p class="dp-desc" id="dpDesc"></p>
    <div class="dp-divider"></div>
    <div><div class="dp-section-label">Key Capabilities</div><div class="dp-feats" id="dpFeats"></div></div>
    <div class="dp-divider"></div>
    <div><div class="dp-section-label">At a Glance</div><div class="dp-stats-grid" id="dpStats"></div></div>
    <div class="dp-cta-row">
      <button class="dp-btn-p" id="dpQ"><i class="fas fa-paper-plane" style="font-size:.72rem"></i> Get a Quote</button>
      <button class="dp-btn-g" id="dpC">Contact Us <i class="fas fa-arrow-right" style="font-size:.68rem"></i></button>
    </div>
  </div>
</aside>

   feats:["Contaminated site characterisation & risk assessment","Soil bioremediation & phytoremediation programmes","In-situ / ex-situ treatment technology design","Habitat reinstatement & revegetation planning","Post-construction ecological monitoring & reporting","Closure plans for industrial & mining sites"],
   stats:[{v:"40+",l:"Remediation Sites"},{v:"ISO",l:"14001"},{v:"NCEC",l:"Approved"}]}
];

var N=D.length, active=0, busy=false, autoTimer=null;
var track=document.getElementById("svcTrack");
var dotsEl=document.getElementById("svcDots");

/* BUILD CARDS */
for(var i=0;i<N;i++){
  (function(idx){
    var svc=D[idx];
    var pills="";
    for(var p=0;p<Math.min(4,svc.feats.length);p++){
      pills+='<span class="svc-card-pill">'+svc.feats[p]+'</span>';
    }
    var stats="";
    for(var k=0;k<svc.stats.length;k++){
      stats+='<div class="svc-card-stat"><span class="svc-card-stat-val">'+svc.stats[k].v+'</span><span class="svc-card-stat-lbl">'+svc.stats[k].l+'</span></div>';
    }
    var num=(idx+1<10?"0":"")+(idx+1);
    var card=document.createElement("div");
    card.className="svc-card"+(idx===0?" active":"");
    card.innerHTML=
      '<div class="svc-card-img" style="background-image:url(\''+svc.img+'\')"></div>'+
      '<div class="svc-card-overlay '+svc.ov+'"></div>'+
      '<div class="svc-card-gradient"></div>'+
      '<div class="svc-card-bg-num">'+num+'</div>'+
      '<div class="svc-card-content">'+
        '<div class="svc-card-num">'+num+' &mdash; Service</div>'+
        '<div class="svc-card-name">'+svc.n+'</div>'+
        '<div class="svc-card-sub">'+svc.s+'</div>'+
        '<div class="svc-card-body">'+
          '<p class="svc-card-desc">'+svc.desc+'</p>'+
          '<div class="svc-card-stats">'+stats+'</div>'+
          '<div class="svc-card-pills">'+pills+'</div>'+
          '<button class="svc-card-more" data-i="'+idx+'">More Information <i class="fas fa-arrow-right" style="font-size:.62rem"></i></button>'+
        '</div>'+
      '</div>';
    card.addEventListener("click",function(e){
      var btn=e.target.closest(".svc-card-more");
      if(btn){e.stopPropagation();openDetail(parseInt(btn.getAttribute("data-i")));return;}
      if(idx===active){openDetail(idx);}else{setActive(idx);}
    });
    track.appendChild(card);
  })(i);
}

/* BUILD DOTS */
for(var d=0;d<N;d++){
  (function(idx){
    var dot=document.createElement("button");
    dot.className="svc-dot"+(idx===0?" active":"");
    dot.addEventListener("click",function(){setActive(idx);});
    dotsEl.appendChild(dot);
  })(d);
}

function setActive(idx){
  if(idx===active||busy)return;
  busy=true;
  var cards=track.querySelectorAll(".svc-card");
  var dots=dotsEl.querySelectorAll(".svc-dot");
  cards[active].classList.remove("active");
  dots[active].classList.remove("active");
  active=((idx%N)+N)%N;
  cards[active].classList.add("active");
  dots[active].classList.add("active");
  var n=active+1;
  document.getElementById("svcCur").textContent=(n<10?"0":"")+n;
  scrollToActive();
  setTimeout(function(){busy=false;},580);
  resetAuto();
}

function scrollToActive(){
  var cards=track.querySelectorAll(".svc-card");
  var wrap=track.parentElement;
  var card=cards[active];
  if(!card||!wrap)return;
  var t=card.offsetLeft-(wrap.offsetWidth/2)+(card.offsetWidth/2)-20;
  track.style.transform="translateX("+(-Math.max(0,t))+"px)";
}

function openDetail(idx){
  var svc=D[idx];
  document.getElementById("dpImg").src=svc.img;
  document.getElementById("dpImg").alt=svc.n;
  document.getElementById("dpBadge").textContent=svc.b;
  var n=idx+1;
  document.getElementById("dpWm").textContent=(n<10?"0":"")+n;
  document.getElementById("dpIcon").innerHTML='<i class="'+svc.ic+'"></i>';
  document.getElementById("dpTitle").textContent=svc.n;
  document.getElementById("dpSub").textContent=svc.s;
  document.getElementById("dpDesc").textContent=svc.desc;
  var fh="";
  for(var f=0;f<svc.feats.length;f++){
    fh+='<div class="dp-feat"><div class="dp-feat-icon"><i class="fas fa-check"></i></div><span class="dp-feat-text">'+svc.feats[f]+'</span></div>';
  }
  document.getElementById("dpFeats").innerHTML=fh;
  var sh="";
  for(var k=0;k<svc.stats.length;k++){
    sh+='<div class="dp-stat"><span class="dp-stat-val">'+svc.stats[k].v+'</span><span class="dp-stat-lbl">'+svc.stats[k].l+'</span></div>';
  }
  document.getElementById("dpStats").innerHTML=sh;
  document.getElementById("detailBackdrop").classList.add("open");
  document.getElementById("detailPanel").classList.add("open");
  document.body.style.overflow="hidden";
  /* re-trigger animations */
  var els=["dpDesc","dpFeats","dpStats"];
  for(var e=0;e<els.length;e++){
    var el=document.getElementById(els[e]);
    if(el){el.style.animation="none";void el.offsetHeight;el.style.animation="";}
  }
}

function closeDetail(){
  document.getElementById("detailBackdrop").classList.remove("open");
  document.getElementById("detailPanel").classList.remove("open");
  document.body.style.overflow="";
}

document.getElementById("detailBackdrop").addEventListener("click",closeDetail);
document.getElementById("dpClose").addEventListener("click",closeDetail);
document.getElementById("dpQ").addEventListener("click",function(){closeDetail();var el=document.getElementById("contact");if(el)el.scrollIntoView({behavior:"smooth"});});
document.getElementById("dpC").addEventListener("click",function(){closeDetail();var el=document.getElementById("contact");if(el)el.scrollIntoView({behavior:"smooth"});});

document.addEventListener("keydown",function(e){
  if(e.key==="Escape")closeDetail();
  if(e.key==="ArrowLeft")setActive(active-1);
  if(e.key==="ArrowRight")setActive(active+1);
});

document.getElementById("svcPrev").addEventListener("click",function(){setActive(active-1);});
document.getElementById("svcNext").addEventListener("click",function(){setActive(active+1);});

/* DRAG */
var dX=0,dD=0,dOn=false;
track.addEventListener("mousedown",function(e){dOn=true;dX=e.clientX;dD=0;track.classList.add("dragging");});
window.addEventListener("mousemove",function(e){if(dOn)dD=e.clientX-dX;});
window.addEventListener("mouseup",function(){if(!dOn)return;dOn=false;track.classList.remove("dragging");if(dD<-60)setActive(active+1);if(dD>60)setActive(active-1);});
track.addEventListener("touchstart",function(e){dX=e.touches[0].clientX;dD=0;},{passive:true});
track.addEventListener("touchmove",function(e){dD=e.touches[0].clientX-dX;},{passive:true});
track.addEventListener("touchend",function(){if(dD<-50)setActive(active+1);if(dD>50)setActive(active-1);});

function resetAuto(){clearInterval(autoTimer);autoTimer=setInterval(function(){setActive(active+1);},5500);}
var tw=document.querySelector(".svc-track-wrap");
if(tw){tw.addEventListener("mouseenter",function(){clearInterval(autoTimer);});tw.addEventListener("mouseleave",resetAuto);}
resetAuto();

/* REVEAL */
var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add("visible");obs.unobserve(e.target);}});},{threshold:0.06});
document.querySelectorAll(".reveal").forEach(function(el){obs.observe(el);});

scrollToActive();
})();
</script>
</body>
</html>
