<!-- ════════════════════════════════════════════════════════
     WHATSAPP BUTTON - CSS
═════════════════════════════════════════════════════════ -->

<style>
  /* WhatsApp Button Container */
  .whatsapp-container {
    position: fixed;
    bottom: 140px; /* Position above chatbot (adjust if needed) */
    right: 28px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  /* WhatsApp Button Styling */
  .whatsapp-btn {
    width: 60px;
    height: 60px;
    background-color: #25D366; /* WhatsApp Green */
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4);
    text-decoration: none;
    transition: all 0.3s ease;
    border: none;
    cursor: pointer;
    position: relative;
  }

  /* WhatsApp Button Hover Effect */
  .whatsapp-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 16px rgba(37, 211, 102, 0.6);
    background-color: #20ba5a; /* Slightly darker green on hover */
  }

  /* WhatsApp Button Active State */
  .whatsapp-btn:active {
    transform: scale(0.95);
  }

  /* WhatsApp Icon Inside Button */
  .whatsapp-icon {
    width: 32px;
    height: 32px;
    fill: white;
    pointer-events: none;
  }

  /* Tooltip Text */
  .whatsapp-tooltip {
    background-color: rgba(0, 0, 0, 0.8);
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    position: absolute;
    top: -40px;
    right: 0;
    pointer-events: none;
  }

  /* Show Tooltip on Hover */
  .whatsapp-container:hover .whatsapp-tooltip {
    opacity: 1;
    visibility: visible;
  }

  /* Mobile Responsive - Smaller Button */
  @media (max-width: 768px) {
    .whatsapp-container {
      bottom: 120px; /* Adjust position for mobile chatbot */
    }

    .whatsapp-btn {
      width: 50px;
      height: 50px;
    }

    .whatsapp-icon {
      width: 26px;
      height: 26px;
    }

    .whatsapp-tooltip {
      font-size: 11px;
      padding: 6px 10px;
      top: -35px;
    }
  }

  /* Extra Small Mobile */
  @media (max-width: 480px) {
    .whatsapp-container {
      bottom: 110px;
      right: 20px;
    }

    .whatsapp-btn {
      width: 48px;
      height: 48px;
    }

    .whatsapp-icon {
      width: 24px;
      height: 24px;
    }
  }

  /* Animation - Subtle Pulse Effect (Optional) */
  @keyframes whatsappPulse {
    0% {
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4);
    }
    50% {
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.6);
    }
    100% {
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4);
    }
  }

  /* Apply pulse animation (uncomment to enable) */
  /* .whatsapp-btn {
    animation: whatsappPulse 2s ease-in-out infinite;
  } */

  /* Disable pulse on hover */
  .whatsapp-btn:hover {
    animation: none;
  }
</style>

<!-- ════════════════════════════════════════════════════════
     WHATSAPP BUTTON - JAVASCRIPT
═════════════════════════════════════════════════════════ -->

<script>
  (function() {
    // Configuration
    const CONFIG = {
      phone: '+966503361798', // Phone number (no spaces or special chars)
      message: 'Hi AECON, I\'m interested in your environmental services. Can you provide more information?',
      buttonId: 'whatsappBtn'
    };

    // Initialize WhatsApp Button
    function initWhatsAppButton() {
      const btn = document.getElementById(CONFIG.buttonId);
      
      if (!btn) {
        console.error('WhatsApp button element not found');
        return;
      }

      // Handle click event
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        openWhatsApp();
      });

      // Prevent default link behavior
      btn.style.pointerEvents = 'auto';
    }

    // Open WhatsApp with pre-filled message
    function openWhatsApp() {
      // Encode the message for URL
      const encodedMessage = encodeURIComponent(CONFIG.message);
      
      // WhatsApp URL format
      // Uses wa.me for both web and mobile
      const whatsappUrl = `https://wa.me/${CONFIG.phone}?text=${encodedMessage}`;
      
      // Open in new tab/window
      window.open(whatsappUrl, '_blank');
    }

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initWhatsAppButton);
    } else {
      initWhatsAppButton();
    }
  })();
</script>
